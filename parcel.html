<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>경북지방우정청 현장 마케팅 - 소포</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        .bg-po-gradient {
            background: linear-gradient(135deg, #e02b20 0%, #b91c1c 100%);
        }
        .subcategory-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .subcategory-card:active {
            transform: scale(0.97);
        }
        @media (hover: hover) {
            .subcategory-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            }
        }
    </style>
</head>
<body class="text-gray-800 pb-12 flex flex-col min-h-screen">

    <header class="bg-po-gradient text-white p-6 shadow-md rounded-b-3xl relative z-10">
        <div class="max-w-screen-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="index.html" class="w-9 h-9 bg-white/20 rounded-full flex items-center justify-center active:scale-95 transition-all" title="메인으로 이동">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
                    </svg>
                </a>
                <div>
                    <h2 class="text-xs font-bold text-red-100 tracking-tight">경북지방우정청 우편영업과</h2>
                    <h1 class="text-xl font-black tracking-tight leading-tight">📦 소포 마케팅 툴킷</h1>
                </div>
            </div>
            <span class="text-xs font-bold bg-white/20 px-2.5 py-1 rounded-full opacity-90">Parcel</span>
        </div>
    </header>

    <main class="flex-1 px-4 mt-8 max-w-screen-md mx-auto w-full">
        
        <div class="grid grid-cols-2 gap-4">
            
            <a href="calculator.html" class="subcategory-card bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center text-center group cursor-pointer block">
                <div class="w-14 h-14 bg-red-50 rounded-2xl flex items-center justify-center mb-3 group-hover:bg-red-100 transition-colors">
                    <span class="text-3xl">🧮</span>
                </div>
                <h3 class="text-base font-black text-gray-900 mb-1">계약소포 요금 계산기</h3>
                <p class="text-[11px] text-gray-500 font-medium leading-tight">월 물량·감액 조건별<br>실시간 맞춤 단가 산출</p>
            </a>

            <a href="register_proposal.html" class="subcategory-card bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center text-center group cursor-pointer block">
                <div class="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center mb-3 group-hover:bg-orange-100 transition-colors">
                    <span class="text-3xl">✉️</span>
                </div>
                <h3 class="text-base font-black text-gray-800 mb-1">계약준등기 제안서</h3>
                <p class="text-[11px] text-gray-500 font-medium leading-tight">소형 가벼운 물품 타겟<br>맞춤형 이용 제안</p>
            </a>

            <a href="parcel_proposal.html" class="subcategory-card bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center text-center group cursor-pointer block">
                <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mb-3 group-hover:bg-blue-100 transition-colors">
                    <span class="text-3xl">📄</span>
                </div>
                <h3 class="text-base font-black text-gray-800 mb-1">계약소포 제안서</h3>
                <p class="text-[11px] text-gray-500 font-medium leading-tight">신규·다량 발송 업체 대상<br>미니소포 및 제안 요약</p>
            </a>

            <a href="rules.html" class="subcategory-card bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center text-center group cursor-pointer block">
                <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center mb-3 group-hover:bg-gray-100 transition-colors">
                    <span class="text-3xl">📜</span>
                </div>
                <h3 class="text-base font-black text-gray-800 mb-1">계약소포 규정</h3>
                <p class="text-[11px] text-gray-500 font-medium leading-tight">추가 감액 기준 및<br>부가이용료 지침 확인</p>
            </a>

        </div>

    </main>

    <footer class="mt-auto text-center pt-8 pb-4">
        <p class="text-[10px] text-gray-400 font-medium">ⓒ 경북지방우정청 우편영업과. All rights reserved.</p>
    </footer>

</body>
</html>
